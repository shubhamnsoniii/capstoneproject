version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    networks:
      - ecommerce-net
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - ecommerce-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5001:5001"
    depends_on:
      - mysql
    networks:
      - ecommerce-net

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "5002:5002"
    depends_on:
      - mysql
    networks:
      - ecommerce-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3001:3000"
    depends_on:
      - product-service
      - order-service
      - inventory-service
    networks:
      - ecommerce-net

networks:
  ecommerce-net:

